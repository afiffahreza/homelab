---
- name: Configure UFW based on node requirements
  hosts: "{{ target_hosts }}"
  become: yes
  tasks:
    - name: Reset UFW to a clean baseline
      community.general.ufw:
        state: reset
    - name: Set UFW default forward policy to ACCEPT (Required for CoreDNS/Pod Egress)
      ansible.builtin.lineinfile:
        path: /etc/default/ufw
        regexp: '^DEFAULT_FORWARD_POLICY='
        line: 'DEFAULT_FORWARD_POLICY="ACCEPT"'
    - name: Allow OpenSSH (IPv4 and IPv6) globally
      community.general.ufw:
        rule: allow
        name: OpenSSH
    - name: Allow all internal cluster mesh traffic from 10.0.0.0/8
      community.general.ufw:
        rule: allow
        src: '10.0.0.0/8'
        comment: 'k8s-internal-mesh'
    - name: Enable UFW
      community.general.ufw:
        state: enabled
    - name: Reload UFW to apply forward policy changes
      community.general.ufw:
        state: reloaded
    - name: Enable UFW
      community.general.ufw:
        state: enabled
