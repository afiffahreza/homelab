apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs
  namespace: monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: victoria-logs-single
      version: ">=0.13.0"
      sourceRef:
        kind: HelmRepository
        name: victoriametrics
  values:
    server:
      persistentVolume:
        enabled: true
        size: 10Gi
