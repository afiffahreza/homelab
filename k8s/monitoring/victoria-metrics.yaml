apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vm-stack
  namespace: monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      version: ">=0.25.0"
      sourceRef:
        kind: HelmRepository
        name: victoriametrics
  values:
    # Customize standard Helm chart values here
    grafana:
      enabled: true
    vmsingle:
      enabled: true
